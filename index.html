<!DOCTYPE html>
<html lang="sr" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bulldog World | Kako odgajati Francuskog buldoga</title>
    


    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Paddle.js SDK (Sandbox mode - ukloni Environment.set za produkciju) -->
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <script>
      Paddle.Environment.set("sandbox");
      Paddle.Initialize({ token: "%VITE_PADDLE_CLIENT_TOKEN%" });
    </script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cream: {
                50: '#FDFCF8',
                100: '#FAF9F6',
                200: '#F2F0E9',
              },
              brand: {
                orange: '#E67E5C',
                dark: '#2D2A26',
                light: '#E0F2F1',
                accent: '#F4A261',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'fade-in': 'fadeIn 0.8s ease-out both',
              'fade-in-down': 'fadeInDown 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards',
              'bounce-slow': 'bounce 3s infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'scale-up': 'scaleUp 0.3s ease-out forwards',
              'float': 'float 4s ease-in-out infinite',
              'shimmer': 'shimmer 2.5s ease-in-out infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              scaleUp: {
                '0%': { opacity: '0', transform: 'scale(0.88)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% center' },
                '100%': { backgroundPosition: '200% center' },
              },
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      


      .perspective-1000 {
        perspective: 1000px;
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }

      /* Gradient text utility */
      .gradient-text {
        background: linear-gradient(135deg, #E67E5C 0%, #F4A261 50%, #E67E5C 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }

      /* Shimmer utility for CTA button */
      .shimmer-btn {
        background: linear-gradient(90deg, #E67E5C 0%, #F4A261 30%, #E67E5C 60%, #E67E5C 100%);
        background-size: 200% auto;
        animation: shimmer 2.5s ease-in-out infinite;
        will-change: background-position;
      }
      .shimmer-btn:hover {
        animation-play-state: paused;
        background-color: #D66C4A !important;
      }

      /* Nav link underline slide-in */
      .nav-link {
        position: relative;
      }
      .nav-link::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background-color: #E67E5C;
        border-radius: 2px;
        transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .nav-link:hover::after {
        width: 100%;
      }

      /* Accessibility: respect reduced motion preferences */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-cream-100 text-brand-dark antialiased selection:bg-brand-orange selection:text-white overflow-x-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
